name: CI/CD → AWS

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download model from S3
        run: |
          aws s3 cp s3://retail-sales-models-zuhairi/sales_prediction_model_rf.pkl .

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest test/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download model from S3
        run: |
          aws s3 cp s3://retail-sales-models-zuhairi/sales_prediction_model_rf.pkl .

      - name: Build, tag & push Docker image ke ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/retail-sales-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/retail-sales-api:$IMAGE_TAG
          docker tag $ECR_REGISTRY/retail-sales-api:$IMAGE_TAG \
                     $ECR_REGISTRY/retail-sales-api:latest
          docker push $ECR_REGISTRY/retail-sales-api:latest

      - name: Deploy ke AWS App Runner
        run: |
          aws apprunner update-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"${{ steps.login-ecr.outputs.registry }}/retail-sales-api:latest\",\"ImageConfiguration\":{\"Port\":\"8001\"},\"ImageRepositoryType\":\"ECR\",\"AuthenticationConfiguration\":{\"AccessRoleArn\":\"arn:aws:iam::971089639882:role/AppRunnerECRAccessRole\"}}}" \
            --region ap-southeast-1
